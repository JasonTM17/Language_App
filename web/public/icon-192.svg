<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="lf192Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lf192Wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="lf192Shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded gradient backdrop -->
  <rect width="192" height="192" rx="40" fill="url(#lf192Bg)"/>

  <!-- Decorative orbital dots representing 4 languages -->
  <g opacity="0.55" fill="white">
    <circle cx="34" cy="40" r="2.5"/>
    <circle cx="160" cy="36" r="2"/>
    <circle cx="158" cy="156" r="2.5"/>
    <circle cx="32" cy="150" r="2"/>
  </g>

  <!-- Speech bubble -->
  <g filter="url(#lf192Shadow)">
    <path d="M40 56
             C40 47 47 40 56 40
             H136
             C145 40 152 47 152 56
             V112
             C152 121 145 128 136 128
             H92
             L66 152
             V128
             H56
             C47 128 40 121 40 112
             Z"
          fill="white"/>
  </g>

  <!-- Flowing L-wave inside bubble (thick stroke) -->
  <path d="M62 66 V100 C62 105 66 109 71 109 H130"
        stroke="url(#lf192Wave)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wave dot accent (suggests audio/voice / second language) -->
  <circle cx="130" cy="68" r="7.5" fill="url(#lf192Wave)"/>

  <!-- Subtle dual-stream wave above the L tail -->
  <path d="M82 84 Q92 78 102 84 T122 84"
        stroke="url(#lf192Wave)" stroke-width="3.2"
        stroke-linecap="round" fill="none" opacity="0.55"/>
</svg>
