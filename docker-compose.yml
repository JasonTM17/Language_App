services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: linguaflow-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/linguaflow.db
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    networks:
      - linguaflow

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: linguaflow-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linguaflow

volumes:
  api-data:

networks:
  linguaflow:
    driver: bridge
