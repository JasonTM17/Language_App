name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: "ci-test-secret-key-do-not-use-in-production"
      NODE_ENV: test
      PORT: 3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: cd api && npm ci
      - name: Setup database
        run: |
          cd api
          npx prisma generate
          npx prisma db push --force-reset --accept-data-loss
          npx tsx src/database/seeds/index.ts
      - run: cd api && npx tsc --noEmit
      - run: cd api && npx vitest run
      - run: cd web && npm ci
      - run: cd web && npx tsc --noEmit

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./api
            image: linguaflow-api
          - context: ./web
            image: linguaflow-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-registry)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            nguyenson1710/${{ matrix.image }}:latest
            nguyenson1710/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/jasontm17/${{ matrix.image }}:latest
            ghcr.io/jasontm17/${{ matrix.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/JasonTM17/Language_App
            org.opencontainers.image.description=LinguaFlow ${{ matrix.image }}
            org.opencontainers.image.licenses=MIT

  release:
    needs: [test, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ### Docker Hub
            ```bash
            docker pull nguyenson1710/linguaflow-api:${{ github.ref_name }}
            docker pull nguyenson1710/linguaflow-web:${{ github.ref_name }}
            ```

            ### GitHub Container Registry
            ```bash
            docker pull ghcr.io/jasontm17/linguaflow-api:${{ github.ref_name }}
            docker pull ghcr.io/jasontm17/linguaflow-web:${{ github.ref_name }}
            ```

            ## Quick Start

            ```bash
            git clone https://github.com/JasonTM17/Language_App.git
            cd Language_App
            docker compose up -d
            ```
