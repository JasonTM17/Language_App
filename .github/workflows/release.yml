name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: cd api && npm ci
      - run: cd api && npx prisma generate
      - run: cd api && npm test
      - run: cd api && npx tsc --noEmit
      - run: cd web && npm ci
      - run: cd web && npx tsc --noEmit

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./api
            image: jasontm17/linguaflow-api
          - context: ./web
            image: jasontm17/linguaflow-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [test, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            docker pull jasontm17/linguaflow-api:${{ github.ref_name }}
            docker pull jasontm17/linguaflow-web:${{ github.ref_name }}
            ```

            ## Quick Start

            ```bash
            git clone https://github.com/JasonTM17/Language_App.git
            cd Language_App
            docker compose up -d
            ```
