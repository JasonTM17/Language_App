name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    name: API - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: "file:./test.db"
      JWT_SECRET: "ci-test-secret-key-do-not-use-in-production"
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - name: Setup database
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  web:
    name: Web - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
