version: 2
updates:
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - api

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - web

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
